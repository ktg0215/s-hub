name: Dev.to Sync Published Titles (one-shot)

# One-time sync: b-1 title/tag optimization 7 articles (2026-06-16)
# Delete this workflow after first successful run.

on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync published titles/tags to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: node dev-to/sync-published-titles.mjs
