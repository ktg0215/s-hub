name: Dev.to Scheduled Publisher

on:
  schedule:
    # Every day at 09:00 UTC (18:00 JST)
    - cron: '0 9 * * *'
  workflow_dispatch: # Manual trigger

concurrency:
  group: devto-publisher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish scheduled articles
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: node dev-to/publish.mjs

      - name: Commit updated frontmatter
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev-to/articles/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Dev.to article frontmatter (devto_id/published)"
            git push
          fi
