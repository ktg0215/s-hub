name: Dev.to Scheduled Publisher

on:
  schedule:
    # Every day at 14:00 UTC (23:00 JST) — peak engagement window: Tue-Thu 12-18 UTC
    - cron: '0 14 * * *'
  workflow_dispatch: # Manual trigger

concurrency:
  group: devto-publisher
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish scheduled articles
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
          # marketing_events upsert (Phase 2-A 経路 2) — secrets 未設定なら silent skip
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node dev-to/publish.mjs

      # if: always() — publish.mjs が per-article エラーで exit 1 しても frontmatter の
      # write-back（devto_id/published）を必ず commit/push する。これが無いと exit 1 で本 step が
      # スキップされ、作成済 draft の id が永続せず次回 run で重複作成/再publish される（6/18-21 実証）。
      - name: Commit updated frontmatter
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev-to/articles/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Dev.to article frontmatter (devto_id/published)"
            git push
          fi
