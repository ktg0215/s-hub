name: Dev.to Analytics Collector

on:
  schedule:
    # Every Monday at 09:00 UTC (18:00 JST) — weekly analytics report
    - cron: '0 9 * * 1'
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Collect Dev.to analytics
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: node dev-to/analytics.mjs

      - name: Commit analytics data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add analytics/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update Dev.to analytics data"
            git push
          fi
